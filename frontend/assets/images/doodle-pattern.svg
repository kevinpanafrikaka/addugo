    <ellipse cx="26" cy="22" rx="4" ry="4"/>
    <path d="M0 14 L22 14"/>
  </g>

  <!-- Coeur -->
  <g class="doodle" transform="translate(10, 110)">
    <path d="M12 20 C12 20 2 13 2 7 C2 4 4 2 7 2 C9 2 11 3 12 5 C13 3 15 2 17 2 C20 2 22 4 22 7 C22 13 12 20 12 20Z"/>
  </g>

  <!-- Cloche notification -->
  <g class="doodle" transform="translate(55, 108)">
    <path d="M12 2 C8 2 5 5 5 9 L5 16 L2 19 L22 19 L19 16 L19 9 C19 5 16 2 12 2Z"/>
    <path d="M9 19 C9 21 10.5 22 12 22 C13.5 22 15 21 15 19"/>
  </g>

  <!-- Tag prix -->
  <g class="doodle" transform="translate(100, 108)">
    <path d="M4 4 L14 4 L22 12 L14 20 L4 20 Z"/>
    <circle cx="8" cy="8" r="2"/>
    <path d="M10 14 L18 6"/>
