<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <style>
      .doodle {
        fill: none;
        stroke: #FF6000;
        stroke-width: 1.2;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.18;
      }
    </style>
  </defs>

  <!-- Moto/Livraison -->
  <g class="doodle" transform="translate(10, 10)">
    <ellipse cx="8" cy="18" rx="7" ry="7"/>
    <ellipse cx="32" cy="18" rx="7" ry="7"/>
    <path d="M8 18 L15 10 L25 10 L32 18"/>
    <path d="M15 10 L18 4 L24 4"/>
    <path d="M20 10 L20 15"/>
  </g>

  <!-- Colis -->
  <g class="doodle" transform="translate(60, 8)">
    <rect x="0" y="6" width="24" height="18" rx="1"/>
    <path d="M0 6 L12 0 L24 6"/>
    <path d="M12 0 L12 24"/>
    <path d="M6 9 L18 9"/>
  </g>

  <!-- Maison -->
  <g class="doodle" transform="translate(120, 8)">
    <path d="M12 2 L22 10 L22 24 L2 24 L2 10 Z"/>
    <path d="M0 10 L12 2 L24 10"/>
    <rect x="8" y="16" width="8" height="8"/>
    <path d="M14 6 L18 6 L18 10 L14 10"/>
  </g>

  <!-- Épingle localisation -->
  <g class="doodle" transform="translate(165, 5)">
    <path d="M12 2 C7 2 3 6 3 11 C3 17 12 26 12 26 C12 26 21 17 21 11 C21 6 17 2 12 2Z"/>
    <circle cx="12" cy="11" r="4"/>
  </g>

  <!-- Sac shopping -->
  <g class="doodle" transform="translate(8, 55)">
    <path d="M4 8 L20 8 L18 24 L6 24 Z"/>
    <path d="M8 8 C8 8 8 3 12 3 C16 3 16 8 16 8"/>
    <path d="M8 13 L16 13"/>
  </g>

  <!-- Étoile -->
  <g class="doodle" transform="translate(55, 50)">
    <path d="M12 2 L14.5 9 L22 9 L16 14 L18.5 21 L12 17 L5.5 21 L8 14 L2 9 L9.5 9 Z"/>
  </g>

  <!-- Téléphone -->
  <g class="doodle" transform="translate(100, 50)">
    <rect x="4" y="1" width="16" height="26" rx="3"/>
    <path d="M4 5 L20 5"/>
    <path d="M4 22 L20 22"/>
    <circle cx="12" cy="25" r="1.5"/>
  </g>

  <!-- Camion livraison -->
  <g class="doodle" transform="translate(140, 52)">
