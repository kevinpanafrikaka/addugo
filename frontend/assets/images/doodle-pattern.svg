  <!-- Flèche route -->
  <g class="doodle" transform="translate(12, 160)">
    <path d="M4 12 L18 12"/>
    <path d="M13 7 L18 12 L13 17"/>
    <path d="M4 8 L4 16"/>
  </g>

  <!-- Reçu -->
  <g class="doodle" transform="translate(55, 158)">
    <path d="M3 2 L21 2 L21 26 L18 24 L15 26 L12 24 L9 26 L6 24 L3 26 Z"/>
    <path d="M7 8 L17 8"/>
    <path d="M7 12 L17 12"/>
    <path d="M7 16 L13 16"/>
