  <!-- Cadeau -->
  <g class="doodle" transform="translate(100, 158)">
    <rect x="2" y="10" width="20" height="14" rx="1"/>
    <path d="M2 10 L22 10 L22 14 L2 14 Z"/>
    <path d="M12 10 L12 24"/>
    <path d="M12 10 C12 10 8 6 10 4 C12 2 14 4 12 8"/>
    <path d="M12 10 C12 10 16 6 14 4 C12 2 10 4 12 8"/>
  </g>

  <!-- Couronne -->
  <g class="doodle" transform="translate(148, 160)">
    <path d="M2 20 L6 8 L12 14 L18 6 L22 14 L26 20 Z"/>
    <path d="M2 20 L26 20"/>
    <circle cx="6" cy="8" r="2"/>
    <circle cx="18" cy="6" r="2"/>
    <circle cx="26" cy="14" r="2"/>
  </g>

</svg>
