<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdduGo — Mon Profil</title>
  <link rel="stylesheet" href="../../assets/css/commun/style.css" />
  <link rel="stylesheet" href="../../assets/css/commun/navbar.css" />
  <link rel="stylesheet" href="../../assets/css/commun/dashboard.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../../assets/css/espace-client/profil.css" />

  

  <!-- Favicon Standard -->
  <link rel="icon" type="image/png" href="../../favicon.png?v=1783501557600" />
  <link rel="shortcut icon" type="image/png" href="../../favicon.png?v=1783501557600" />
  <link rel="apple-touch-icon" href="../../favicon.png?v=1783501557600" />
</head>
<body class="dashboard-body" style="background-color: #F7F8FA;">

  <!-- NAVBAR : Accueil + Messages + Mon Espace Client + Avatar -->
  <nav class="navbar-home">
    <div class="navbar-home-gauche">
      <button class="btn-mobile-menu" id="btn-mobile-menu-home" style="padding: 0; width: 40px; height: 40px; border-radius: 50%; overflow: hidden; border: 2px solid var(--orange); cursor: pointer; flex-shrink: 0;">
        <img src="../../medias/default-avatar.png" alt="Profil" id="mobile-top-avatar" style="width: 100%; height: 100%; object-fit: cover;" />
      </button>

      <div style="display: flex; align-items: center; gap: 8px;">
        <a href="../mes-shoppings/home.html" class="navbar-home-logo" style="display: flex; align-items: center;">
          <img src="../../medias/AdduGo_Logo.png" alt="AdduGo" style="height: 38px; width: auto; object-fit: contain;" />
        </a>
        <!-- Ligne de séparation verticale symétrique -->
        <div style="height: 22px; width: 2px; background-color: var(--bordure-dark, #d1d5db); border-radius: 2px; margin: 0 6px; flex-shrink: 0;"></div>
        <!-- Titre Mon Profil -->
        <div class="navbar-titre-page">
          <span>Mon</span><span style="color: var(--orange);">Profil</span> 
          <i class="fas fa-user-circle" style="color:var(--orange);"></i>
        </div>
      </div>
    </div>

    <div class="navbar-home-droite">
      <!-- 1. Accueil -->
      <a href="../mes-shoppings/home.html" class="nav-icone" title="Accueil">
        <i class="fas fa-house-user" style="color: #00A88F; font-size: 1.25rem;"></i>
      </a>

      <!-- 2. Mes Messages -->
      <div style="position: relative;">
        <a href="messages.html" class="nav-icone" title="Messages">
          <i class="fas fa-envelope" style="color: #3B82F6; font-size: 1.2rem;"></i>
          <span class="nav-badge" id="badge-messages" style="display: none;">0</span>
        </a>
      </div>

      <!-- 3. Mon Espace Client -->
      <a href="dashboard.html" class="nav-icone" title="Mon Espace Client">
        <i class="fas fa-user-circle" style="color: #7A3E1D; font-size: 1.25rem;"></i>
      </a>

      <!-- Avatar + Dropdown -->
      <div class="profil-wrapper" id="profil-wrapper">
        <div class="navbar-profil-btn" id="btn-profil-toggle">
          <img src="../../medias/default-avatar.png" alt="Profil" id="navbar-top-avatar" />
        </div>
        <div class="profil-dropdown" id="profil-dropdown">
          <div class="dropdown-header">
            <img src="../../medias/default-avatar.png" alt="Profil" id="dropdown-avatar" style="width:50px;height:50px;border-radius:50%;object-fit:cover;" />
            <div class="dropdown-infos">
              <div class="dropdown-nom" id="dropdown-nom">Chargement...</div>
              <div class="dropdown-role" id="dropdown-roles-badges">Client</div>
            </div>
          </div>
          <div class="dropdown-menu-container">
            <a href="profil.html" class="sidebar-lien actif" style="margin-top:6px;">
              <i class="fas fa-user" style="color:var(--orange);"></i> Mon Profil
            </a>
            <a href="../mes-shoppings/home.html" class="sidebar-lien">
              <i class="fas fa-home"></i> Home
            </a>
            <a href="dashboard.html" class="sidebar-lien">
              <i class="fas fa-user-circle"></i> Mon Espace Client
            </a>
            <a href="../espace-livreur/dashboard.html" class="sidebar-lien">
              <i class="fas fa-motorcycle"></i> Mon Espace Livreur
            </a>
            <div style="border-top:1px solid var(--bordure);margin-top:6px;padding-top:6px;">
              <a href="#" class="sidebar-lien btn-deconnexion" id="btn-logout" style="color:#dc3545;">
                <i class="fas fa-sign-out-alt"></i> Se déconnecter
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- PAGE PROFIL -->
  <div class="profil-page-conteneur">

    <div id="alerte-profil"></div>

    <!-- EN-TÊTE AVATAR + NOM -->
    <div class="profil-header-card">
      <div class="profil-header-accent"></div>
      <div class="profil-header-body">
        <label for="upload-photo" class="profil-avatar-wrapper" id="avatar-gros-conteneur" title="Changer ma photo">
          <div id="avatar-gros-initiales" style="width:100%;height:100%;background:#FFF3EE;color:var(--orange);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.9rem;">?</div>
          <div class="profil-avatar-overlay">
            <i class="fas fa-camera"></i>
            <span>Modifier</span>
          </div>
        </label>
        <input type="file" id="upload-photo" accept="image/png,image/jpeg,image/jpg" style="display:none;" />

        <div class="profil-header-infos">
          <h1 id="banniere-nom">Chargement...</h1>
          <div class="profil-roles-texte" id="banniere-role">Client</div>
        </div>
      </div>
    </div>

    <!-- CARTE INFORMATIONS PERSONNELLES -->
    <div class="profil-carte">
      <div class="profil-carte-titre-bloc">
        <div class="profil-carte-icone" style="background:#FFF3EE;color:var(--orange);border:1px solid rgba(255,96,0,0.15);">
          <i class="fas fa-id-card"></i>
        </div>
        <div>
          <h2>Informations Personnelles</h2>
          <p>Vos identifiants et coordonnées.</p>
        </div>
      </div>

      <form id="form-profil">

        <!-- Prénom & Nom -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;" class="grid-responsive">
          <div class="form-groupe">
            <label class="form-label">
              <i class="fas fa-user" style="color:var(--orange);margin-right:5px;"></i> Prénom
            </label>
            <input type="text" id="profil-prenom" class="form-controle" required />
          </div>
          <div class="form-groupe">
            <label class="form-label">
              <i class="fas fa-user-tag" style="color:var(--orange);margin-right:5px;"></i> Nom
            </label>
            <input type="text" id="profil-nom" class="form-controle" required />
          </div>
        </div>

        <!-- Genre -->
        <div class="form-groupe" style="margin-bottom:14px;">
          <label class="form-label">
            <i class="fas fa-venus-mars" style="color:var(--orange);margin-right:5px;"></i> Genre
          </label>
          <input type="hidden" id="profil-genre" value="M" />
          <div class="genre-grid">
            <div class="profil-genre-card actif" data-genre="M"><i class="fas fa-male" style="margin-right:4px;"></i>Homme</div>
            <div class="profil-genre-card" data-genre="F"><i class="fas fa-female" style="margin-right:4px;"></i>Femme</div>
          </div>
        </div>

        <!-- Email -->
        <div class="form-groupe" style="margin-bottom:14px;">
          <label class="form-label">
            <i class="fas fa-envelope" style="color:var(--orange);margin-right:5px;"></i> Adresse Email
          </label>
          <input type="email" id="profil-email" class="form-controle" required />
        </div>

        <!-- Téléphone & Adresse -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;" class="grid-responsive">
          <div class="form-groupe">
            <label class="form-label">
              <i class="fas fa-phone-alt" style="color:var(--orange);margin-right:5px;"></i> Téléphone
            </label>
            <input type="text" id="profil-telephone" class="form-controle" placeholder="+224 620 00 00 00" />
          </div>
          <div class="form-groupe">
            <label class="form-label">
              <i class="fas fa-map-marker-alt" style="color:var(--orange);margin-right:5px;"></i> Adresse / Zone
            </label>
            <input type="text" id="profil-adresse" class="form-controle" placeholder="ex: Conakry, Ratoma" />
          </div>
        </div>

        <button type="submit" class="btn-profil-submit btn-orange-submit" id="btn-save-profil">
          <i class="fas fa-save"></i> Enregistrer les modifications
        </button>
      </form>
    </div>

    <!-- CARTE SÉCURITÉ -->
    <div class="profil-carte">
      <div class="profil-carte-titre-bloc">
        <div class="profil-carte-icone" style="background: rgba(26,26,46,0.08); color: #1A1A2E; border: 1px solid rgba(26,26,46,0.15);">
          <i class="fas fa-lock"></i>
        </div>
        <div>
          <h2>Sécurité & Mot de Passe</h2>
          <p>Modifiez votre mot de passe.</p>
        </div>
      </div>

      <form id="form-securite">

        <div class="form-groupe" style="margin-bottom:14px;">
          <label class="form-label">
            <i class="fas fa-key" style="color: #1A1A2E; margin-right: 5px;"></i> Mot de passe actuel
          </label>
          <div class="input-with-eye">
            <input type="password" id="mdp-actuel" class="form-controle" required placeholder="••••••••" />
            <button type="button" class="btn-toggle-mdp" data-target="mdp-actuel">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;" class="grid-responsive">
          <div class="form-groupe">
            <label class="form-label">
              <i class="fas fa-lock" style="color: #1A1A2E; margin-right: 5px;"></i> Nouveau mot de passe
            </label>
            <div class="input-with-eye">
              <input type="password" id="mdp-nouveau" class="form-controle" required placeholder="••••••••" />
              <button type="button" class="btn-toggle-mdp" data-target="mdp-nouveau">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>
          <div class="form-groupe">
            <label class="form-label">
              <i class="fas fa-check-double" style="color: #1A1A2E; margin-right: 5px;"></i> Confirmer
            </label>
            <div class="input-with-eye">
              <input type="password" id="mdp-confirm" class="form-controle" required placeholder="••••••••" />
              <button type="button" class="btn-toggle-mdp" data-target="mdp-confirm">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>
        </div>

        <button type="submit" class="btn-profil-submit btn-noir-submit" id="btn-save-securite">
          <i class="fas fa-key"></i> Changer le mot de passe
        </button>
      </form>
    </div>

  </div>

  <!-- Grilles responsives sur mobile -->
  <link rel="stylesheet" href="../../assets/css/espace-client/profil.css" />

  <script src="../../assets/js/commun/api.js"></script>
  <script src="../../assets/js/commun/navbar.js"></script>
  <script src="../../assets/js/commun/shared-profil.js"></script>
  <script src="../assets/js/commun/doodles.js"></script>
</body>
</html>
