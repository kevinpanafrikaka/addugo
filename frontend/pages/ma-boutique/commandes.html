<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdduGo — Commandes Reçues</title>
  <link rel="stylesheet" href="../../assets/css/commun/style.css" />
  <link rel="stylesheet" href="../../assets/css/commun/navbar.css" />
  <link rel="stylesheet" href="../../assets/css/commun/dashboard.css" />
  <link rel="stylesheet" href="../../assets/css/commun/commandes.css" />
  <link rel="stylesheet" href="../../assets/css/ma-boutique/commandes.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="dashboard-body">

  <!-- NAVBAR UNIFIÉE -->
  <nav class="navbar-home">
    <div class="navbar-home-gauche">
      <button class="btn-mobile-menu" id="btn-mobile-menu-home" style="padding: 0; width: 40px; height: 40px; border-radius: 50%; overflow: hidden; border: 2px solid var(--orange);">
        <img src="../../medias/default-avatar.png" alt="Profil" id="mobile-top-avatar" style="width: 100%; height: 100%; object-fit: cover;" />
      </button>
      <div style="display: flex; align-items: center; gap: 8px;">
        <a href="../mes-shoppings/home.html" class="navbar-home-logo" style="display: flex; align-items: center;">
          <img src="../../medias/AdduGo_Logo.png" alt="AdduGo" style="height: 38px; width: auto; object-fit: contain;" />
        </a>
        <!-- Ligne de séparation verticale symétrique -->
        <div style="height: 22px; width: 2px; background-color: var(--bordure-dark, #d1d5db); border-radius: 2px; margin: 0 6px; flex-shrink: 0;"></div>
        <!-- Titre -->
        <div class="navbar-titre-page">
          <span>Ma</span><span style="color: var(--orange);">Boutique</span> 
          <i class="fas fa-store" style="color:var(--orange);"></i>
        </div>
      </div>
    </div>

    <div class="navbar-home-droite">
      <!-- 1. Icône Mon Espace Client (Chocolat #7A3E1D) -->
      <a href="../espace-client/dashboard.html" class="nav-icone icone-client" title="Mon Espace Client">
        <i class="fas fa-user-circle" style="color: #7A3E1D;"></i>
      </a>

      <!-- 2. Icône Messages (Bleu #3B82F6) -->
      <div class="icon-wrapper" style="position: relative;" title="Messages">
        <a href="../espace-client/messages.html?from=commerce" class="nav-icone icone-messages">
          <i class="fas fa-envelope" style="color: #3B82F6;"></i>
          <span class="nav-badge" id="badge-messages" style="display: none;">0</span>
        </a>
      </div>

      <!-- 3. Icône Ma Boutique (Vert #10B981) -->
      <a href="produits.html" class="nav-icone icone-produits" title="Ma Boutique">
        <i class="fas fa-store" style="color: #10B981;"></i>
      </a>
      
      <div class="profil-wrapper" id="profil-wrapper">
        <div class="navbar-profil-btn" id="btn-profil-toggle">
          <img src="../../medias/default-avatar.png" alt="Profil" id="navbar-top-avatar" />
        </div>
        
        <div class="profil-dropdown" id="profil-dropdown">
          <div class="dropdown-header">
            <img src="../../medias/default-avatar.png" alt="Profil" id="dropdown-avatar" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover;" />
            <div class="dropdown-infos">
              <div class="dropdown-nom" id="dropdown-nom">Chargement...</div>
              <div class="dropdown-role" id="dropdown-roles-badges">Commerce</div>
            </div>
          </div>
          
          <div class="dropdown-menu-container">
            <a href="../espace-client/profil.html" class="sidebar-lien" style="margin-top: 8px;">
              <i class="fas fa-user"></i> Mon Profil
            </a>
            
            <a href="produits.html" class="sidebar-lien">
              <i class="fas fa-store"></i> Ma Boutique
            </a>
            
            <a href="../espace-client/dashboard.html" class="sidebar-lien">
              <i class="fas fa-user-circle"></i> Mon Espace Client
            </a>
            
            <div style="border-top: 1px solid var(--bordure); margin-top: 8px; padding-top: 8px;">
              <a href="#" class="sidebar-lien btn-deconnexion" id="btn-logout" style="color: #dc3545;">
                <i class="fas fa-sign-out-alt"></i> Se déconnecter
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- LAYOUT -->
  <div class="home-layout" style="background-color: var(--fond-tres-clair); min-height: calc(100vh - 70px);">

    <!-- CONTENU -->
    <main class="dashboard-contenu anime-slide-up" style="max-width: 100%; margin: 0 auto; padding: 30px 25px 25px 25px;">

      <!-- EN-TÊTE COMMANDES REDESIGNÉE -->
      <div class="entete-commandes-v2" style="background: var(--blanc); border: 1px solid var(--bordure); border-radius: 18px; padding: 20px 24px; margin-bottom: 22px; box-shadow: 0 4px 16px rgba(0,0,0,0.02);">
        
        <!-- LIGNE 1 : MESSAGE DE BIENVENUE + BOUTON STATISTIQUES AU MÊME NIVEAU -->
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 18px; border-bottom: 1px solid var(--bordure-claire, #F3F4F6); padding-bottom: 16px;">
          <div style="display: flex; align-items: center; gap: 12px;">
            <div style="width: 4px; height: 38px; background: var(--orange); border-radius: 2px;"></div>
            <div>
              <h1 class="commandes-titre" style="font-size: 1.35rem; color: var(--texte); font-family: var(--police-titre); font-weight: 800; margin: 0; line-height: 1.2;">Mes Commandes <span class="orange">Reçues</span></h1>
              <p class="commandes-sous-titre" style="color: var(--texte-gris); font-size: 0.88rem; margin: 3px 0 0 0; line-height: 1.4;">Gérez et traitez les commandes de vos clients en temps réel.</p>
            </div>
          </div>

          <div>
            <a href="statistiques.html" class="btn btn-voir-stats-cmd" style="border-radius: 12px; font-weight: 700; padding: 9px 18px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; font-size: 0.86rem; background: var(--noir, #1A1A2E); color: #FFFFFF; box-shadow: 0 4px 14px rgba(26,26,46,0.22); transition: transform 0.2s ease;">
              <svg viewBox="0 0 32 32" width="20" height="20" xmlns="http://www.w3.org/2000/svg" style="display:inline-block; flex-shrink: 0;">
                <path d="M 16 16 L 16 2 A 14 14 0 0 1 28.12 23 Z" fill="#EF4444" stroke="white" stroke-width="1.2"/>
                <path d="M 16 16 L 28.12 23 A 14 14 0 0 1 3.88 23 Z" fill="#F59E0B" stroke="white" stroke-width="1.2"/>
                <path d="M 16 16 L 3.88 23 A 14 14 0 0 1 16 2 Z" fill="#10B981" stroke="white" stroke-width="1.2"/>
              </svg> Voir mes statistiques
            </a>
          </div>
        </div>

        <!-- LIGNE 2 : LES CARTES DE STATISTIQUES RÉPARTIES D'UN BOUT À L'AUTRE -->
        <div class="commandes-stats-grid-v2" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;">
          <div class="commandes-stat-card-v2" style="background: #FFF3EE; border: 1px solid #FFE0D1; border-radius: 14px; padding: 14px 18px; display: flex; align-items: center; gap: 14px;">
            <div style="width: 42px; height: 42px; border-radius: 12px; background: var(--orange); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.15rem; flex-shrink: 0;">
              <i class="fas fa-box"></i>
            </div>
            <div>
              <div style="font-size: 1.35rem; font-weight: 800; color: var(--texte); font-family: var(--police-titre); line-height: 1.1;" id="stat-total">0</div>
              <div style="font-size: 0.78rem; font-weight: 700; color: var(--texte-gris); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px;">Total Commandes</div>
            </div>
          </div>

          <div class="commandes-stat-card-v2" style="background: #FFF9E6; border: 1px solid #FFEAB6; border-radius: 14px; padding: 14px 18px; display: flex; align-items: center; gap: 14px;">
            <div style="width: 42px; height: 42px; border-radius: 12px; background: #F59E0B; color: white; display: flex; align-items: center; justify-content: center; font-size: 1.15rem; flex-shrink: 0;">
              <i class="fas fa-hourglass-half"></i>
            </div>
            <div>
              <div style="font-size: 1.35rem; font-weight: 800; color: var(--texte); font-family: var(--police-titre); line-height: 1.1;" id="stat-attente">0</div>
              <div style="font-size: 0.78rem; font-weight: 700; color: var(--texte-gris); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px;">En Attente</div>
            </div>
          </div>

          <div class="commandes-stat-card-v2" style="background: #E8F5E9; border: 1px solid #C8E6C9; border-radius: 14px; padding: 14px 18px; display: flex; align-items: center; gap: 14px;">
            <div style="width: 42px; height: 42px; border-radius: 12px; background: #10B981; color: white; display: flex; align-items: center; justify-content: center; font-size: 1.15rem; flex-shrink: 0;">
              <i class="fas fa-check-circle"></i>
            </div>
            <div>
              <div style="font-size: 1.35rem; font-weight: 800; color: var(--texte); font-family: var(--police-titre); line-height: 1.1;" id="stat-livrees">0</div>
              <div style="font-size: 0.78rem; font-weight: 700; color: var(--texte-gris); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px;">Commandes Livrées</div>
            </div>
          </div>
        </div>

      </div>

      <!-- FILTRES -->
      <div class="filtres-barre">
        <div class="filtres-gauche">
          <button class="filtre-btn actif" data-statut="tous">Toutes</button>
          <button class="filtre-btn" data-statut="en_attente"><i class="fas fa-hourglass-half"></i> En attente</button>
          <button class="filtre-btn" data-statut="confirmee"><i class="fas fa-check-circle"></i> Confirmées</button>
          <button class="filtre-btn" data-statut="en_preparation"><i class="fas fa-wrench"></i> En préparation</button>
          <button class="filtre-btn" data-statut="prete"><i class="fas fa-box"></i> Prêtes</button>
          <button class="filtre-btn" data-statut="livree">Livrées</button>
        </div>
      </div>

      <!-- LISTE COMMANDES -->
      <div id="liste-commandes">
        <div class="chargement">
          <div class="skeleton skeleton-carte" style="width:100%"></div>
          <div class="skeleton skeleton-carte" style="width:100%"></div>
          <div class="skeleton skeleton-carte" style="width:100%"></div>
        </div>
      </div>

      <!-- MODAL DÉTAIL COMMANDE -->
      <div class="modal-overlay" id="modal-commande">
        <div class="modal">
          <div class="modal-entete">
            <h3>Détail de la commande <span id="modal-commande-id"></span></h3>
            <button class="modal-fermer" id="modal-fermer">
              <i class="fas fa-times"></i>
            </button>
          </div>
          <div class="modal-corps">
            <div id="detail-commande-contenu">
              <div class="chargement">
                <div class="spinner"></div>
              </div>
            </div>
          </div>
          <div class="modal-pied">
            <button class="btn btn-contour-orange" id="btn-fermer-detail">
              Fermer
            </button>
            <div id="btn-statut-groupe" class="flex gap-sm"></div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="../../assets/js/commun/api.js"></script>
  <script src="../../assets/js/commun/navbar.js"></script>
  <script src="../../assets/js/ma-boutique/commandes.js"></script>
</body>
</html>
