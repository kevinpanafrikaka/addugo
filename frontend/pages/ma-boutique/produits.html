<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdduGo — Mes Produits</title>
    <link rel="stylesheet" href="../../assets/css/commun/style.css" />
  <link rel="stylesheet" href="../../assets/css/commun/dashboard.css" />
  <link rel="stylesheet" href="../../assets/css/commun/commandes.css" />
  <link rel="stylesheet" href="../../assets/css/commun/navbar.css" />
  <link rel="stylesheet" href="../../assets/css/ma-boutique/produits.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <link rel="icon" type="image/png" href="../../medias/Addugo_Logo_Nav.png" />
</head>
<body class="dashboard-body">

  <!-- NAVBAR UNIFIÉE -->
  <nav class="navbar-home">
    <div class="navbar-home-gauche">
      <button class="btn-mobile-menu" id="btn-mobile-menu-home" style="padding: 0; width: 40px; height: 40px; border-radius: 50%; overflow: hidden; border: 2px solid var(--orange);">
        <img src="../../medias/default-avatar.png" alt="Profil" id="mobile-top-avatar" style="width: 100%; height: 100%; object-fit: cover;" />
      </button>
      <div style="display: flex; align-items: center; gap: 8px;">
        <a href="../mes-shoppings/home.html" class="navbar-home-logo" style="display: flex; align-items: center;">
          <img src="../../medias/AdduGo_Logo.png" alt="AdduGo" style="height: 38px; width: auto; object-fit: contain;" />
        </a>
        <!-- Ligne de séparation verticale symétrique -->
        <div style="height: 22px; width: 2px; background-color: var(--bordure-dark, #d1d5db); border-radius: 2px; margin: 0 6px; flex-shrink: 0;"></div>
        <!-- Titre -->
        <div class="navbar-titre-page">
          <span>Ma</span><span style="color: var(--orange);">Boutique</span> 
          <i class="fas fa-store" style="color:var(--orange);"></i>
        </div>
      </div>
    </div>

    <!-- BARRE DE RECHERCHE (style Home) -->
    <div class="navbar-home-recherche" style="max-width: 400px; flex:1; margin: 0 20px;">
      <input type="text" id="recherche-produit" placeholder="Rechercher dans mes produits..." />
      <button onclick="document.getElementById('recherche-produit').dispatchEvent(new Event('input'))">
        <i class="fas fa-search"></i>
      </button>
    </div>

    <div class="navbar-home-droite">
      <!-- 1. Icône Mon Espace Client (Chocolat #7A3E1D) -->
      <a href="../espace-client/dashboard.html" class="nav-icone icone-client" title="Mon Espace Client">
        <i class="fas fa-user-circle" style="color: #7A3E1D;"></i>
      </a>

      <!-- 2. Icône Messages (Bleu #3B82F6) -->
      <div class="icon-wrapper" style="position: relative;" title="Messages">
        <a href="../espace-client/messages.html?from=commerce" class="nav-icone icone-messages">
          <i class="fas fa-envelope" style="color: #3B82F6;"></i>
          <span class="nav-badge" id="badge-messages" style="display: none;">0</span>
        </a>
      </div>

      <!-- 3. Icône Statistiques (Camembert 3 couleurs) -->
      <a href="statistiques.html" class="nav-icone icone-statistiques" title="Statistiques">
        <svg viewBox="0 0 32 32" width="26" height="26" xmlns="http://www.w3.org/2000/svg" style="display:block;">
          <path d="M 16 16 L 16 2 A 14 14 0 0 1 28.12 23 Z" fill="#EF4444" stroke="white" stroke-width="1.2"/>
          <path d="M 16 16 L 28.12 23 A 14 14 0 0 1 3.88 23 Z" fill="#F59E0B" stroke="white" stroke-width="1.2"/>
          <path d="M 16 16 L 3.88 23 A 14 14 0 0 1 16 2 Z" fill="#10B981" stroke="white" stroke-width="1.2"/>
        </svg>
      </a>
      <div class="profil-wrapper" id="profil-wrapper">
        <div class="navbar-profil-btn" id="btn-profil-toggle">
          <img src="../../medias/default-avatar.png" alt="Profil" id="navbar-top-avatar" />
        </div>
        
        <div class="profil-dropdown" id="profil-dropdown">
          <div class="dropdown-header">
            <img src="../../medias/default-avatar.png" alt="Profil" id="dropdown-avatar" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover;" />
            <div class="dropdown-infos">
              <div class="dropdown-nom" id="dropdown-nom">Chargement...</div>
              <div class="dropdown-role" id="dropdown-roles-badges">Commerce</div>
            </div>
          </div>
          
          <div class="dropdown-menu-container">
            <a href="../espace-client/profil.html" class="sidebar-lien" style="margin-top: 8px;">
              <i class="fas fa-user"></i> Mon Profil
            </a>
            
            <a href="produits.html" class="sidebar-lien actif">
              <i class="fas fa-store"></i> Ma Boutique
            </a>
            
            <a href="../espace-client/dashboard.html" class="sidebar-lien">
              <i class="fas fa-user-circle"></i> Mon Espace Client
            </a>
            
            <div style="border-top: 1px solid var(--bordure); margin-top: 8px; padding-top: 8px;">
              <a href="#" class="sidebar-lien btn-deconnexion" id="btn-logout" style="color: #dc3545;">
                <i class="fas fa-sign-out-alt"></i> Se déconnecter
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- LAYOUT -->
  <div class="home-layout" style="background-color: var(--fond-tres-clair);">

    <!-- CONTENU -->
    <main class="dashboard-contenu anime-slide-up" style="max-width: 100%; margin: 0 auto; padding: 15px 20px 15px 20px;">

      <!-- EN-TÊTE PRODUITS REDESIGNÉE -->
      <div class="entete-produits-v2" style="background: var(--blanc); border: 1px solid var(--bordure); border-radius: 18px; padding: 20px 24px; margin-bottom: 22px; box-shadow: 0 4px 16px rgba(0,0,0,0.02);">
        
        <!-- LIGNE 1 : MESSAGE DE BIENVENUE + BOUTONS D'ACTION -->
        <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px; margin-bottom: 16px; border-bottom: 1px solid var(--bordure-claire, #F3F4F6); padding-bottom: 16px;">
          <div>
            <h1 id="titre-bienvenue" style="font-size: 1.35rem; color: var(--texte); font-family: var(--police-titre); font-weight: 800; margin: 0 0 4px 0; line-height: 1.2;">Chargement...</h1>
            <p id="sous-titre-bienvenue" style="color: var(--texte-gris); font-size: 0.88rem; margin: 0; line-height: 1.4;">Gérez votre catalogue et développez votre activité en toute simplicité.</p>
          </div>

          <!-- GROUPE BOUTONS D'ACTION -->
          <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap; position: relative;" class="entete-boutons-groupe">
            <a href="commandes.html" class="btn" style="border-radius: 12px; font-weight: 700; padding: 9px 18px; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; font-size: 0.86rem; background: var(--noir, #1A1A2E); color: #FFFFFF; box-shadow: 0 4px 14px rgba(26,26,46,0.22); transition: transform 0.2s ease;">
              <i class="fas fa-box" style="color: var(--orange);"></i> Voir mes commandes
            </a>

            <button class="btn btn-orange" id="btn-ajouter-produit" style="border-radius: 12px; font-weight: 700; padding: 9px 18px; display: inline-flex; align-items: center; gap: 8px; font-size: 0.86rem; box-shadow: 0 4px 14px rgba(255,107,0,0.25);">
              <i class="fas fa-plus"></i> Ajouter un produit
            </button>
            
            <!-- MODAL AJOUTER/MODIFIER PRODUIT (MODE DROPDOWN) -->
            <div class="dropdown-modal-container" id="modal-produit">
              <div class="modal" style="margin: 0; box-shadow: 0 10px 40px rgba(0,0,0,0.15); border: 1px solid var(--bordure); border-radius: 16px;">
                <div class="modal-entete">
                  <h3 id="modal-titre">Ajouter un produit</h3>
                  <button class="modal-fermer" id="modal-fermer">
                    <i class="fas fa-times"></i>
                  </button>
                </div>
                <div class="modal-corps" style="max-height: 60vh; overflow-y: auto;">
                  <div id="alerte-produit"></div>
                  <input type="hidden" id="produit-id" value="" />

                  <div class="grille grille-2" style="gap: 15px; align-items: start;">
                    <!-- COLONNE GAUCHE -->
                    <div>
                      <div class="form-groupe" style="margin-bottom: 10px;">
                        <label class="form-label" style="margin-bottom: 4px;">
                          <i class="fas fa-camera"></i> Image du produit
                        </label>
                        <div id="upload-zone-images" style="border: 2px dashed var(--bordure); border-radius: 12px; padding: 12px; text-align: center; background: var(--fond-tres-clair);">
                          <img id="preview-image-produit" src="" alt="Aperçu"
                               style="display:none; width:100%; max-height:130px; object-fit:cover; border-radius:8px; margin-bottom:8px;" />
                          <label for="produit-images" id="label-upload-image"
                                 style="cursor:pointer; display:inline-block; padding: 7px 16px; background: var(--orange); color:#fff; border-radius:8px; font-size:0.82rem; font-weight:600;">
                            <i class="fas fa-cloud-upload-alt"></i> Choisir une photo
                          </label>
                          <p id="nom-fichier-image" style="margin:5px 0 0; font-size:0.75rem; color:var(--texte-gris);">Aucun fichier sélectionné</p>
                          <input type="file" id="produit-images" accept="image/*" multiple style="display:none;" />
                        </div>
                      </div>

                      <div class="form-groupe" style="margin-bottom: 0;">
                        <label class="form-label" style="margin-bottom: 4px;">
                          <i class="fas fa-align-left"></i> Description
                        </label>
                        <textarea class="form-textarea" id="produit-description"
                          placeholder="Décrivez votre produit..." style="height: 75px; padding: 8px;"></textarea>
                      </div>
                    </div>

                    <!-- COLONNE DROITE -->
                    <div>
                      <div class="form-groupe" style="margin-bottom: 10px;">
                        <label class="form-label" style="margin-bottom: 4px;">
                          <i class="fas fa-tag"></i> Nom du produit
                        </label>
                        <input type="text" class="form-input" id="produit-nom"
                          placeholder="Ex: Samsung Galaxy S24" style="padding: 8px;" required />
                      </div>

                      <div class="grille grille-2" style="gap: 10px; margin-bottom: 10px;">
                        <div class="form-groupe" style="margin-bottom: 0;">
                          <label class="form-label" style="margin-bottom: 4px;">
                            <i class="fas fa-money-bill"></i> Prix (GNF)
                          </label>
                          <input type="number" class="form-input" id="produit-prix"
                            placeholder="Ex: 5000000" min="0" style="padding: 8px;" required />
                        </div>
                        <div class="form-groupe" style="margin-bottom: 0;">
                          <label class="form-label" style="margin-bottom: 4px;">
                            <i class="fas fa-cubes"></i> Stock
                          </label>
                          <input type="number" class="form-input" id="produit-stock"
                            placeholder="Ex: 10" min="0" style="padding: 8px;" required />
                        </div>
                      </div>

                      <div class="grille grille-2" style="gap: 10px;">
                        <div class="form-groupe" style="margin-bottom: 0;">
                          <label class="form-label" style="margin-bottom: 4px;">
                            <i class="fas fa-list"></i> Catégorie
                          </label>
                          <select class="form-select" id="produit-categorie" style="padding: 8px;" required>
                            <option value="">-- Catégorie --</option>
                          </select>
                        </div>
                        <div class="form-groupe" style="margin-bottom: 0;">
                          <label class="form-label" style="margin-bottom: 4px;">
                            <i class="fas fa-toggle-on"></i> Disponibilité
                          </label>
                          <select class="form-select" id="produit-disponible" style="padding: 8px;">
                            <option value="1">Disponible</option>
                            <option value="0">Indisponible</option>
                          </select>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="modal-pied">
                  <button class="btn btn-contour-orange" id="btn-annuler-produit">
                    Annuler
                  </button>
                  <button class="btn btn-orange" id="btn-sauvegarder-produit">
                    <i class="fas fa-save"></i> Sauvegarder
                  </button>
                </div>
              </div>
            </div>

          </div>
        </div>

        <!-- LIGNE 2 : COMPTEUR + FILTRES DE RECHERCHE -->
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
          <div style="display: flex; align-items: center; gap: 14px; flex-wrap: wrap;">
            <span id="compteur-produits" class="compteur-style" style="font-weight: 700; color: var(--texte-gris); font-size: 0.86rem; margin: 0; border-right: 1px solid var(--bordure); padding-right: 14px;"></span>
            
            <div class="filtres-produits">
              <button class="filtre-btn actif" data-filtre="tous" style="padding: 6px 14px; font-size: 0.82rem; border-radius: 20px;">Tous</button>
              <button class="filtre-btn" data-filtre="disponible" style="padding: 6px 14px; font-size: 0.82rem; border-radius: 20px;"><i class="fas fa-check-circle" style="font-size: 0.75rem;"></i> Disponibles</button>
              <button class="filtre-btn" data-filtre="indisponible" style="padding: 6px 14px; font-size: 0.82rem; border-radius: 20px;"><i class="fas fa-times-circle" style="font-size: 0.75rem;"></i> Indisponibles</button>
            </div>
          </div>
        </div>

      </div>

      <!-- LISTE PRODUITS -->
      <div id="liste-produits">
        <div class="chargement">
          <div class="skeleton skeleton-carte" style="width:100%"></div>
          <div class="skeleton skeleton-carte" style="width:100%"></div>
          <div class="skeleton skeleton-carte" style="width:100%"></div>
        </div>
      </div>



    </main>
  </div>

  <!-- BOTTOM NAV (MOBILE) -->
  <nav class="bottom-nav">
    <ul class="bottom-nav-liste">
      <a href="dashboard.html" class="bottom-nav-item">
        <i class="fas fa-home"></i> Accueil
      </a>
      <a href="produits.html" class="bottom-nav-item actif">
        <i class="fas fa-box"></i> Produits
      </a>
      <a href="commandes.html" class="bottom-nav-item">
        <i class="fas fa-shopping-bag"></i> Commandes
      </a>
    </ul>
  </nav>

  <script src="../../assets/js/commun/api.js"></script>
  <script src="../../assets/js/commun/navbar.js"></script>
  <script src="../../assets/js/ma-boutique/produits.js"></script>
</body>
</html>
