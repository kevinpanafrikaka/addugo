<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AdduGo - Résultats de recherche</title>
    <link rel="stylesheet" href="../../assets/css/commun/style.css" />
  <link rel="stylesheet" href="../../assets/css/commun/dashboard.css" />
  <link rel="stylesheet" href="../../assets/css/commun/navbar.css" />
  
  <!-- FontAwesome pour les icônes -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    /* Styles spécifiques pour la page de recherche */
    .recherche-layout {
      display: flex;
      gap: 24px;
      padding: var(--espace-xl);
      width: 100%;
      align-items: flex-start;
    }

    .recherche-sidebar {
      width: 260px;
      background: var(--blanc);
      border-radius: var(--rayon-lg);
      padding: 24px;
      box-shadow: var(--ombre-sm);
      flex-shrink: 0;
      position: sticky;
      top: 90px;
    }

    .filtre-groupe {
      margin-bottom: 24px;
    }

    .filtre-groupe:last-child {
      margin-bottom: 0;
    }

    .filtre-titre {
      font-size: 1rem;
      font-weight: 700;
      color: var(--texte);
      margin-bottom: 12px;
      font-family: var(--police-titre);
    }

    .filtre-option {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--texte-doux);
    }

    .filtre-option input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--orange);
    }

    .recherche-main {
      flex: 1;
    }

    .recherche-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      background: var(--blanc);
      padding: 16px 24px;
      border-radius: var(--rayon-lg);
      box-shadow: var(--ombre-sm);
    }

    .recherche-titre {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--texte);
    }

    .recherche-titre span {
      color: var(--orange);
    }

    .recherche-tri select {
      padding: 8px 12px;
      border: 1px solid var(--bordure);
      border-radius: var(--rayon-md);
      font-family: var(--police);
      outline: none;
      color: var(--texte);
    }

    /* Grille de produits */
    .produits-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: var(--espace-lg);
    }

    .aucun-resultat {
      text-align: center;
      padding: 60px 20px;
      background: var(--blanc);
      border-radius: var(--rayon-lg);
      box-shadow: var(--ombre-sm);
    }

    .aucun-resultat i {
      font-size: 4rem;
      color: var(--bordure);
      margin-bottom: 16px;
    }

    .aucun-resultat h3 {
      font-size: 1.2rem;
      color: var(--texte);
      margin-bottom: 8px;
    }

    .aucun-resultat p {
      color: var(--texte-gris);
    }
  </style>
</head>
<body class="dashboard-body">

  <!-- NAVBAR UNIFIÉE (Importée depuis home.html) -->
  <nav class="navbar-home" style="display: flex; align-items: center; justify-content: space-between; padding: var(--espace-sm) var(--espace-xl); background: var(--blanc); box-shadow: var(--ombre-sm); position: sticky; top: 0; z-index: 100; height: 70px;">
    <div class="navbar-home-gauche" style="display: flex; align-items: center; gap: var(--espace-xl); flex-grow: 1;">
      <a href="home.html" class="navbar-home-logo" style="height: 55px; display: block;">
        <img src="../../medias/AdduGo_Logo.png" alt="AdduGo" style="height: 100%; object-fit: contain; transition: transform 0.3s;" />
      </a>
      
      <div class="navbar-home-recherche-groupe" style="display: flex; align-items: center; gap: 12px; flex-grow: 1; max-width: 600px; margin: 0 auto;">
        <div class="navbar-home-recherche" style="display: flex; align-items: center; background: var(--fond); border: 2px solid var(--orange); border-radius: 50px; padding: 4px 6px 4px 16px; flex-grow: 1;">
          <input type="text" id="navbar-search-input" placeholder="Rechercher des produits, des boutiques..." style="border: none; background: transparent; padding: 8px 0; width: 100%; outline: none; font-size: 0.95rem;" />
          <button id="navbar-search-btn" style="background: var(--orange); border: none; color: var(--blanc); cursor: pointer; font-size: 1rem; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;"><i class="fas fa-search"></i></button>
        </div>
      </div>
    </div>

    <div class="navbar-home-droite" style="display: flex; align-items: center; gap: var(--espace-md);">
      <a href="home.html" class="nav-icone" style="position: relative; color: var(--texte); font-size: 1.5rem; display: flex; align-items: center; justify-content: center; text-decoration: none; width: 32px; height: 32px;" title="Retour à l'accueil">
        <i class="fas fa-home"></i>
      </a>
      <a href="client/commandes.html" class="nav-icone" style="position: relative; color: var(--texte); font-size: 1.5rem; display: flex; align-items: center; justify-content: center; text-decoration: none; width: 32px; height: 32px;" title="Commandes">
        <i class="fas fa-box"></i>
      </a>
      <a href="#" class="nav-icone" id="btn-panier-toggle" style="position: relative; color: var(--texte); font-size: 1.5rem; display: flex; align-items: center; justify-content: center; text-decoration: none; width: 32px; height: 32px;" title="Panier">
        <i class="fas fa-shopping-cart"></i>
        <span class="nav-badge" id="badge-panier-home" style="position: absolute; top: -8px; right: -8px; background: var(--orange); color: var(--blanc); font-size: 0.7rem; font-weight: bold; height: 18px; min-width: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 4px; border: 2px solid var(--blanc); display: none;">0</span>
      </a>
      
      <div class="profil-wrapper" id="profil-wrapper">
        <div class="navbar-profil-btn" id="btn-profil-toggle">
          <img src="../../medias/default-avatar.png" alt="Profil" id="navbar-top-avatar" style="width: 100%; height: 100%; object-fit: cover;" />
        </div>
        
        <div class="profil-dropdown" id="profil-dropdown">
          <div class="dropdown-header">
            <img src="../../medias/default-avatar.png" alt="Profil" id="dropdown-avatar" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover;" />
            <div class="dropdown-infos">
              <div class="dropdown-nom" id="dropdown-nom">Chargement...</div>
              <div class="dropdown-role" id="dropdown-roles-badges">Client</div>
            </div>
          </div>
          
          <div class="dropdown-menu-container">
            <div class="sidebar-section-titre" style="padding-top: 8px;">Mon Compte</div>
            <a href="client/profil.html" class="sidebar-lien">
              <i class="fas fa-user"></i> Mon profil
            </a>
            <a href="#" class="sidebar-lien">
              <i class="fas fa-bell"></i> Notifications
            </a>
            
            <div class="sidebar-section-titre" style="margin-top: 8px;">Mes Espaces</div>
            <div id="conteneur-mes-espaces">
              <a href="client/dashboard.html" class="sidebar-lien">
                <i class="fas fa-user-circle"></i> Espace Client
              </a>
            </div>
            
            <div class="sidebar-section-titre" style="margin-top: 8px;">Découverte</div>
            <a href="#" class="sidebar-lien">
              <i class="fas fa-store"></i> Boutiques
            </a>
            <a href="home.html" class="sidebar-lien">
              <i class="fas fa-box-open"></i> Tous les produits
            </a>
            <a href="#" class="sidebar-lien">
              <i class="fas fa-compass"></i> Parcourir
            </a>
            
            <div class="sidebar-section-titre" style="margin-top: 8px;">Support</div>
            <a href="#" class="sidebar-lien">
              <i class="fas fa-headset"></i> Centre d'aide
            </a>
            
            <div style="border-top: 1px solid var(--bordure); margin-top: 8px; padding-top: 8px;">
              <a href="#" class="sidebar-lien btn-deconnexion" id="btn-logout" style="color: #dc3545;">
                <i class="fas fa-sign-out-alt"></i> Se déconnecter
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="recherche-layout">
    <!-- FILTRES (SIDEBAR) -->
    <aside class="recherche-sidebar">
      <div class="filtre-groupe">
        <div class="filtre-titre">Catégories</div>
        <label class="filtre-option"><input type="checkbox"> Électronique</label>
        <label class="filtre-option"><input type="checkbox"> Vêtements</label>
        <label class="filtre-option"><input type="checkbox"> Maison & Bureau</label>
        <label class="filtre-option"><input type="checkbox"> Beauté & Santé</label>
      </div>

      <div class="filtre-groupe">
        <div class="filtre-titre">Prix</div>
        <label class="filtre-option"><input type="checkbox"> Moins de 100 000 GNF</label>
        <label class="filtre-option"><input type="checkbox"> 100 000 - 500 000 GNF</label>
        <label class="filtre-option"><input type="checkbox"> Plus de 500 000 GNF</label>
      </div>

      <div class="filtre-groupe">
        <div class="filtre-titre">Livraison</div>
        <label class="filtre-option"><input type="checkbox"> Livraison Gratuite</label>
        <label class="filtre-option"><input type="checkbox"> AdduGo Express</label>
      </div>
    </aside>

    <!-- RÉSULTATS (MAIN) -->
    <main class="recherche-main">
      <div class="recherche-header">
        <div class="recherche-titre">Résultats pour <span id="recherche-query-text">"..."</span></div>
        <div class="recherche-tri">
          <select>
            <option>Pertinence</option>
            <option>Prix croissant</option>
            <option>Prix décroissant</option>
            <option>Meilleures ventes</option>
          </select>
        </div>
      </div>

      <div class="produits-grid" id="recherche-resultats-feed">
        <!-- Loader affiché en attendant les résultats JS -->
        <div class="skeleton" style="height: 300px; border-radius: 12px; background: #e0e0e0; animation: pulse 1.5s infinite;"></div>
        <div class="skeleton" style="height: 300px; border-radius: 12px; background: #e0e0e0; animation: pulse 1.5s infinite;"></div>
        <div class="skeleton" style="height: 300px; border-radius: 12px; background: #e0e0e0; animation: pulse 1.5s infinite;"></div>
      </div>
    </main>
  </div>

  <!-- OVERLAY ET SIDEBAR DU PANIER -->
  <div class="panier-overlay" id="panier-overlay"></div>
  <div class="panier-sidebar" id="panier-sidebar">
    <div class="panier-header">
      <div class="panier-titre">
        Mon Panier <span class="panier-badge-titre">0 article</span>
      </div>
      <button class="btn-fermer-panier" id="btn-fermer-panier"><i class="fas fa-times"></i></button>
    </div>
    <div class="panier-body">
      <!-- Rempli dynamiquement -->
    </div>
  </div>
  <style>
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }
  </style>

  <script src="../../assets/js/commun/api.js"></script>
  <script src="../../assets/js/commun/panier.js"></script>
  <script src="../../assets/js/commun/navbar.js"></script>
  <script src="../../assets/js/mes-shoppings/recherche.js"></script>
</body>
</html>
