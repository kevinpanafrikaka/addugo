<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdduGo — Détails du Produit</title>
  
  <link rel="stylesheet" href="../../assets/css/commun/style.css" />
  <link rel="stylesheet" href="../../assets/css/commun/navbar.css" />
  <link rel="stylesheet" href="../../assets/css/mes-shoppings/produit-details.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Favicon Standard -->
  <link rel="icon" type="image/png" href="../../favicon.png?v=1783501557640" />
  <link rel="shortcut icon" type="image/png" href="../../favicon.png?v=1783501557640" />
  <link rel="apple-touch-icon" href="../../favicon.png?v=1783501557640" />
</head>
<body class="bg-light">

  <!-- NAVBAR UNIFIÉE -->
  <nav class="navbar-home">
    <div class="navbar-home-gauche">
      <div style="display: flex; align-items: center; gap: 4px;">
        <a href="home.html" class="navbar-home-logo" style="display: flex; align-items: center;">
          <img src="../../medias/AdduGo_Logo.png" alt="AdduGo" style="height: 38px; width: auto; object-fit: contain;" />
        </a>
        <!-- Ligne de séparation verticale -->
        <div style="height: 22px; width: 2px; background-color: var(--bordure-dark, #d1d5db); border-radius: 2px; margin: 0 6px; flex-shrink: 0;"></div>
        <!-- Titre -->
        <div class="navbar-titre-page" style="display: flex; align-items: center; gap: 6px; font-size: 0.95rem; font-weight: 800;">
          <span>
            <span style="color: var(--noir, #1A1A2E);">Mes</span> <span style="color: var(--orange);">Shoppings</span>
          </span>
          <i class="fas fa-shopping-bag" style="color: var(--orange); font-size: 1.1rem;"></i>
        </div>
      </div>
    </div>
    <div class="navbar-home-droite" style="display: flex; align-items: center; gap: 14px;">
      
      <!-- Icône Accueil -->
      <a href="home.html" class="nav-btn-icon" title="Accueil Shopping" style="color: var(--texte); font-size: 1.25rem; text-decoration: none; display: flex; align-items: center;">
        <i class="fas fa-home"></i>
      </a>

      <!-- Icône Mes Messages -->
      <a href="../espace-client/messages.html" class="nav-btn-icon" title="Mes Messages" style="color: var(--texte); font-size: 1.25rem; text-decoration: none; display: flex; align-items: center; position: relative;">
        <i class="fas fa-comment-dots"></i>
      </a>

      <!-- Icône Mon Espace / Panier -->
      <a href="../espace-client/panier.html" class="nav-btn-icon nav-panier-btn" title="Mon Panier" style="display:none; position:relative; color: var(--texte); font-size: 1.25rem; text-decoration: none;" id="nav-panier-icon">
        <i class="fas fa-shopping-cart"></i>
        <span class="badge" id="cart-count" style="position:absolute; top:-8px; right:-8px; background:var(--orange); color:white; border-radius:50%; width:18px; height:18px; font-size:0.7rem; display:flex; align-items:center; justify-content:center;">0</span>
      </a>

      <!-- Mon Espace Client (Avatar) -->
      <a href="../espace-client/dashboard.html" class="nav-btn-icon" title="Mon Espace Client" id="nav-profil-container" style="display: flex; align-items: center; color: var(--texte); font-size: 1.25rem; text-decoration: none;">
        <i class="fas fa-user-circle" id="nav-icon-user"></i>
        <img src="../../medias/default-avatar.png" alt="Profil" id="nav-avatar-img" style="display:none; width:36px; height:36px; border-radius:50%; object-fit:cover; border:2px solid var(--orange);" />
      </a>

    </div>
  </nav>

  <main class="conteneur-principal">

    <!-- SKELETON LOADER -->
    <div id="loader-produit" class="produit-details-container skeleton-active">
      <div class="produit-image-col skeleton-box" style="height: 400px;"></div>
      <div class="produit-info-col">
        <div class="skeleton-box" style="width:30%; height:20px; margin-bottom:15px;"></div>
        <div class="skeleton-box" style="width:80%; height:35px; margin-bottom:20px;"></div>
        <div class="skeleton-box" style="width:40%; height:40px; margin-bottom:30px;"></div>
        <div class="skeleton-box" style="width:100%; height:100px; margin-bottom:20px;"></div>
      </div>
    </div>

    <!-- CONTENU DU PRODUIT -->
    <div id="contenu-produit" class="produit-details-container" style="display:none;">
      <!-- Colonne Image -->
      <div class="produit-image-col">
        <img src="" alt="Produit" id="detail-image" class="detail-image-principale" onerror="this.src='../../medias/AdduGo_Logo.png'" />
      </div>
      
      <!-- Colonne Informations -->
      <div class="produit-info-col">
        <div class="detail-categorie" id="detail-categorie">Catégorie</div>
        <h1 class="detail-nom" id="detail-nom">Nom du Produit</h1>
        <div class="detail-prix" id="detail-prix">0 GNF</div>
        
        <div class="detail-description" id="detail-description">
          Description du produit...
        </div>
        
        <div class="detail-actions">
          <button class="btn btn-orange btn-grand" id="btn-add-cart">
            <i class="fas fa-cart-plus"></i> Ajouter au panier
          </button>
        </div>

        <hr class="separateur" />

        <!-- Info Boutique -->
        <div class="detail-boutique-info">
          <img src="" alt="Boutique" id="boutique-logo" class="boutique-logo" onerror="this.src='../../medias/default-avatar.png'" />
          <div class="boutique-text">
            <h3 id="boutique-nom">Nom de la Boutique</h3>
            <p id="boutique-adresse"><i class="fas fa-map-marker-alt"></i> Adresse</p>
          </div>
          <button class="btn btn-contour-orange btn-sm" id="btn-contact-boutique">
            <i class="fas fa-comment-dots"></i> Contacter
          </button>
        </div>
      </div>
    </div>

    <!-- MESSAGE D'ERREUR -->
    <div id="erreur-produit" style="display:none; text-align:center; padding: 60px 20px;">
      <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: var(--orange); margin-bottom: 20px;"></i>
      <h2 style="color: var(--texte); margin-bottom: 10px;">Produit introuvable</h2>
      <p style="color: var(--texte-gris); margin-bottom: 25px;">Ce produit n'existe pas ou a été retiré de la vente.</p>
      <a href="home.html" class="btn btn-orange"><i class="fas fa-arrow-left"></i> Retour aux produits</a>
    </div>

    <!-- AUTRES PRODUITS DE LA BOUTIQUE -->
    <section class="section-recommandations" id="section-boutique" style="display:none; margin-top: 50px;">
      <h2 class="section-titre">Plus de produits de cette boutique</h2>
      <div class="grille-produits" id="grille-boutique">
        <!-- Rempli par JS -->
      </div>
    </section>

    <!-- PRODUITS SIMILAIRES -->
    <section class="section-recommandations" id="section-similaires" style="display:none; margin-top: 50px; margin-bottom: 50px;">
      <h2 class="section-titre">Produits similaires</h2>
      <div class="grille-produits" id="grille-similaires">
        <!-- Rempli par JS -->
      </div>
    </section>

  </main>

  <script src="../../assets/js/commun/api.js"></script>
  <script src="../../assets/js/commun/navbar.js"></script>
  <script src="../../assets/js/commun/panier.js"></script>
  <script src="../../assets/js/mes-shoppings/produit-details.js"></script>
</body>
</html>
