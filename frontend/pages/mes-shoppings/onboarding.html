<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdduGo — Bienvenue</title>
  <link rel="stylesheet" href="../../assets/css/commun/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fff5ee 0%, #ffffff 50%, #fff9f5 100%);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ─── NAVBAR ─── */
    .ob-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 24px;
      background: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .ob-nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .ob-nav-logo img {
      height: 38px;
      width: auto;
    }

    /* ─── CONTENU PRINCIPAL ─── */
    .ob-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 48px;
    }

    .ob-carte {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      padding: 40px 36px;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    /* ─── ICON INTRO ─── */
    .ob-icon-intro {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FF6600, #ff8c38);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 6px 20px rgba(255,102,0,0.30);
    }

    .ob-icon-intro i {
      font-size: 1.8rem;
      color: #fff;
    }

    .ob-titre {
      font-size: 1.6rem;
      font-weight: 900;
      color: #1a1a2e;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .ob-titre span { color: #FF6600; }

    .ob-sous-titre {
      font-size: 0.9rem;
      color: #6b7280;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* ─── ALERTE ─── */
    #alerte-onboarding {
      margin-bottom: 16px;
    }

    .alerte {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.875rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .alerte-erreur {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .alerte-succes {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    /* ─── ZONE UPLOAD ─── */
    .upload-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: #374151;
      text-align: left;
      display: block;
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }

    .upload-zone {
      position: relative;
      border: 2.5px dashed #e5e7eb;
      border-radius: 20px;
      padding: 28px 20px;
      cursor: pointer;
      transition: all 0.25s ease;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .upload-zone:hover,
    .upload-zone:focus-within {
      border-color: #FF6600;
      background: #fff8f2;
      box-shadow: 0 0 0 4px rgba(255,102,0,0.08);
    }

    .upload-zone.a-une-image {
      border-color: #FF6600;
      background: #fff8f2;
      padding: 16px 20px;
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      z-index: 2;
    }

    .upload-icone-wrapper {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #fff0e6;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .upload-icone-wrapper i {
      font-size: 1.4rem;
      color: #FF6600;
    }

    .upload-texte {
      font-size: 0.875rem;
      color: #6b7280;
      line-height: 1.4;
    }

    .upload-texte strong {
      color: #FF6600;
      font-weight: 700;
    }

    .upload-info {
      font-size: 0.75rem;
      color: #9ca3af;
    }

    /* ─── APERCU ─── */
    #apercu-profil {
      display: none;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #FF6600;
      box-shadow: 0 4px 16px rgba(255,102,0,0.25);
      position: relative;
      z-index: 1;
    }

    /* ─── BOUTONS ─── */
    .btn-terminer {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #FF6600, #e55a00);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 800;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 4px 16px rgba(255,102,0,0.35);
      letter-spacing: 0.2px;
    }

    .btn-terminer:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(255,102,0,0.45);
    }

    .btn-terminer:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-passer {
      background: none;
      border: none;
      color: #9ca3af;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 14px;
      transition: color 0.2s ease;
      font-family: 'Inter', sans-serif;
    }

    .btn-passer:hover {
      color: #6b7280;
    }

    /* ─── RESPONSIVE MOBILE ─── */
    @media (max-width: 480px) {
      .ob-carte {
        padding: 28px 20px;
        border-radius: 20px;
      }

      .ob-titre {
        font-size: 1.35rem;
      }

      .upload-zone {
        padding: 22px 16px;
      }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="ob-nav">
    <a href="../accueil/index.html" class="ob-nav-logo">
      <img src="../../medias/AdduGo_Logo.png" alt="AdduGo" />
    </a>
  </nav>

  <!-- CONTENU -->
  <main class="ob-main">
    <div class="ob-carte">

      <!-- ICONE ET TITRE -->
      <div class="ob-icon-intro">
        <i class="fas fa-user-circle"></i>
      </div>
      <h1 class="ob-titre">Bienvenue sur <span>AdduGo</span> !</h1>
      <p class="ob-sous-titre">Ajoutez une photo de profil pour personnaliser votre compte et inspirer confiance.</p>

      <!-- ALERTE -->
      <div id="alerte-onboarding"></div>

      <!-- FORMULAIRE -->
      <form id="form-onboarding" novalidate>

        <label class="upload-label" for="input-profil">
          <i class="fas fa-camera" style="color: #FF6600; margin-right: 6px;"></i> Votre photo de profil
        </label>

        <div class="upload-zone" id="zone-profil">
          <input type="file" id="input-profil" accept="image/*" />

          <!-- Aperçu (caché au départ) -->
          <img id="apercu-profil" alt="Aperçu de votre photo de profil" />

          <!-- Texte indicatif -->
          <div class="upload-icone-wrapper">
            <i class="fas fa-cloud-upload-alt"></i>
          </div>
          <p class="upload-texte"><strong>Cliquez</strong> ou glissez une image ici</p>
          <p class="upload-info">JPG, PNG, WEBP — Max 5 Mo</p>
        </div>

        <button type="submit" class="btn-terminer" id="btn-terminer">
          <i class="fas fa-check-circle"></i>
          Terminer mon inscription
        </button>

        <button type="button" class="btn-passer" onclick="passerEtape()">
          Passer cette étape pour l'instant
        </button>

      </form>
    </div>
  </main>

  <script src="../../assets/js/commun/api.js"></script>
  <script src="../../assets/js/mes-shoppings/onboarding.js"></script>
</body>
</html>
