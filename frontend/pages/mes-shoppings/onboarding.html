<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdduGo — Bienvenue</title>
  <link rel="stylesheet" href="../../assets/css/commun/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../../assets/css/mes-shoppings/onboarding.css" />

  

  <!-- Favicon Standard -->
  <link rel="icon" type="image/png" href="../../favicon.png?v=1783501557635" />
  <link rel="shortcut icon" type="image/png" href="../../favicon.png?v=1783501557635" />
  <link rel="apple-touch-icon" href="../../favicon.png?v=1783501557635" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="ob-nav">
    <a href="../accueil/index.html" class="ob-nav-logo">
      <img src="../../medias/AdduGo_Logo.png" alt="AdduGo" />
    </a>
  </nav>

  <!-- CONTENU -->
  <main class="ob-main">
    <div class="ob-carte">

      <!-- ICONE ET TITRE -->
      <div class="ob-icon-intro">
        <i class="fas fa-user-circle"></i>
      </div>
      <h1 class="ob-titre">Bienvenue sur <span>AdduGo</span> !</h1>
      <p class="ob-sous-titre">Ajoutez une photo de profil pour personnaliser votre compte et inspirer confiance.</p>

      <!-- ALERTE -->
      <div id="alerte-onboarding"></div>

      <!-- FORMULAIRE -->
      <form id="form-onboarding" novalidate>

        <label class="upload-label" for="input-profil">
          <i class="fas fa-camera" style="color: #FF6600; margin-right: 6px;"></i> Votre photo de profil
        </label>

        <div class="upload-zone" id="zone-profil">
          <input type="file" id="input-profil" accept="image/*" />

          <!-- Aperçu (caché au départ) -->
          <img id="apercu-profil" alt="Aperçu de votre photo de profil" />

          <!-- Texte indicatif -->
          <div class="upload-icone-wrapper">
            <i class="fas fa-cloud-upload-alt"></i>
          </div>
          <p class="upload-texte"><strong>Cliquez</strong> ou glissez une image ici</p>
          <p class="upload-info">JPG, PNG, WEBP — Max 5 Mo</p>
        </div>

        <button type="submit" class="btn-terminer" id="btn-terminer">
          <i class="fas fa-check-circle"></i>
          Terminer mon inscription
        </button>

        <button type="button" class="btn-passer" onclick="passerEtape()">
          Passer cette étape pour l'instant
        </button>

      </form>
    </div>
  </main>

  <script src="../../assets/js/commun/api.js"></script>
  <script src="../../assets/js/mes-shoppings/onboarding.js"></script>
  <script src="../assets/js/commun/doodles.js"></script>
</body>
</html>
