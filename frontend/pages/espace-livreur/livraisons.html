<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdduGo — Mes Livraisons Livreur</title>
  <link rel="stylesheet" href="../../assets/css/commun/style.css" />
  <link rel="stylesheet" href="../../assets/css/commun/navbar.css" />
  <link rel="stylesheet" href="../../assets/css/commun/dashboard.css" />
  <link rel="stylesheet" href="../../assets/css/commun/commandes.css" />
  <link rel="stylesheet" href="../../assets/css/espace-livreur/livraisons.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  

  <!-- Favicon Standard -->
  <link rel="icon" type="image/png" href="../../favicon.png?v=1783501557609" />
  <link rel="shortcut icon" type="image/png" href="../../favicon.png?v=1783501557609" />
  <link rel="apple-touch-icon" href="../../favicon.png?v=1783501557609" />
</head>
<body class="dashboard-body">

  <!-- NAVBAR UNIFIÉE -->
  <nav class="navbar-home">
    <div class="navbar-home-gauche">
      <button class="btn-mobile-menu" id="btn-mobile-menu-home" style="padding: 0; width: 40px; height: 40px; border-radius: 50%; overflow: hidden; border: 2px solid var(--orange);">
        <img src="../../medias/default-avatar.png" alt="Profil" id="mobile-top-avatar" style="width: 100%; height: 100%; object-fit: cover;" />
      </button>
      <div style="display: flex; align-items: center; gap: 8px;">
        <a href="../mes-shoppings/home.html" class="navbar-home-logo" style="display: flex; align-items: center;">
          <img src="../../medias/AdduGo_Logo.png" alt="AdduGo" style="height: 38px; width: auto; object-fit: contain;" />
        </a>
        <div style="height: 22px; width: 2px; background-color: var(--bordure-dark, #d1d5db); border-radius: 2px; margin: 0 6px; flex-shrink: 0;"></div>
        <div class="navbar-titre-page">
          <span>Mon Espace</span><span style="color: var(--orange);">Livreur</span> 
          <i class="fas fa-motorcycle" style="color:var(--orange);"></i>
        </div>
      </div>
    </div>

    <div class="navbar-home-droite">
      <!-- 1. Icône Mon Espace Client (Chocolat #7A3E1D) -->
      <a href="../espace-client/dashboard.html" class="nav-icone icone-client" title="Mon Espace Client">
        <i class="fas fa-user-circle" style="color: #7A3E1D;"></i>
      </a>

      <!-- 2. Icône Mes Messages (Bleu #3B82F6) -->
      <div class="icon-wrapper" style="position: relative;" title="Messages">
        <a href="../espace-client/messages.html?from=livreur" class="nav-icone icone-messages">
          <i class="fas fa-envelope" style="color: #3B82F6;"></i>
          <span class="nav-badge" id="badge-messages" style="display: none;">0</span>
        </a>
      </div>

      <!-- 3. Icône Mon Espace Livreur (Moto Noir Siphon) -->
      <a href="dashboard.html" class="nav-icone icone-livreur" title="Mon Espace Livreur">
        <i class="fas fa-motorcycle" style="color: var(--noir, #1A1A2E); font-size: 1.25rem;"></i>
      </a>

      <div class="profil-wrapper" id="profil-wrapper">
        <div class="navbar-profil-btn" id="btn-profil-toggle">
          <img src="../../medias/default-avatar.png" alt="Profil" id="navbar-top-avatar" />
        </div>
        
        <div class="profil-dropdown" id="profil-dropdown">
          <div class="dropdown-header">
            <img src="../../medias/default-avatar.png" alt="Profil" id="dropdown-avatar" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover;" />
            <div class="dropdown-infos">
              <div class="dropdown-nom" id="dropdown-nom">Chargement...</div>
              <div class="dropdown-role" id="dropdown-roles-badges">Livreur</div>
            </div>
          </div>
          
          <div class="dropdown-menu-container">
            <a href="../espace-client/profil.html" class="sidebar-lien" style="margin-top: 8px;">
              <i class="fas fa-user"></i> Mon Profil
            </a>
            
            <a href="dashboard.html" class="sidebar-lien actif">
              <i class="fas fa-motorcycle"></i> Mon Espace Livreur
            </a>
            
            <a href="../espace-client/dashboard.html" class="sidebar-lien">
              <i class="fas fa-user-circle"></i> Mon Espace Client
            </a>
            
            <div style="border-top: 1px solid var(--bordure); margin-top: 8px; padding-top: 8px;">
              <a href="#" class="sidebar-lien btn-deconnexion" id="btn-logout" style="color: #dc3545;">
                <i class="fas fa-sign-out-alt"></i> Se déconnecter
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- LAYOUT -->
  <div class="home-layout" style="background-color: var(--fond-tres-clair); min-height: calc(100vh - 70px);">

    <!-- CONTENU -->
    <main class="dashboard-contenu anime-slide-up" style="max-width: 1200px; margin: 0 auto; padding: 25px 20px 25px 20px;">

      <!-- EN-TÊTE ACCUEIL LIVRAISONS -->
      <div class="livreur-titre-zone" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 22px;">
        <div class="livreur-titre-gauche" style="display: flex; align-items: center; gap: 12px;">
          <div style="width: 4px; height: 38px; background: var(--orange); border-radius: 2px;"></div>
          <div>
            <h1 class="livreur-titre" style="font-size: 1.35rem; color: var(--texte); font-family: var(--police-titre); font-weight: 800; margin: 0; line-height: 1.2;">
              Mes <span class="orange">Livraisons</span> <i class="fas fa-motorcycle" style="color:var(--orange);margin-right:4px;"></i></h1>
            <p class="livreur-sous-titre" style="color: var(--texte-gris); font-size: 0.88rem; margin: 3px 0 0 0; line-height: 1.4;">
              Suivez l'état de l'ensemble des courses attribuées et terminées.
            </p>
          </div>
        </div>

        <a href="statistiques.html" class="btn btn-noir btn-statistiques-livreur" style="border-radius: 12px; font-weight: 800; padding: 10px 20px; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 10px; background: var(--noir, #1A1A2E); color: #FFFFFF; box-shadow: 0 4px 14px rgba(26,26,46,0.22);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle; flex-shrink: 0;">
            <path d="M11 1.5C5.8 2.0 2.0 5.8 1.5 11H11V1.5Z" fill="#00B074"/>
            <path d="M13 1.5V11H22.5C22.0 5.8 18.2 2.0 13 1.5Z" fill="#E53935"/>
            <path d="M2.0 13C2.8 18.0 7.0 22.2 12 22.5C17.0 22.2 21.2 18.0 22.0 13H2.0Z" fill="#FF9800"/>
          </svg>
          <span>Voir mes statistiques</span>
        </a>
      </div>

      <!-- FILTRES PAR STATUT LIVREUR -->
      <div class="filtres-barre" style="margin-bottom: 20px;">
        <div class="filtres-gauche" style="display: flex; gap: 8px; flex-wrap: wrap;">
          <button class="filtre-btn actif" data-statut="tous" style="border-radius: 12px; font-weight: 700; padding: 8px 16px;">
            Toutes
          </button>
          <button class="filtre-btn" data-statut="en_livraison" style="border-radius: 12px; font-weight: 700; padding: 8px 16px;">
            <i class="fas fa-motorcycle" style="color: #3B82F6;"></i> En livraison
          </button>
          <button class="filtre-btn" data-statut="livree" style="border-radius: 12px; font-weight: 700; padding: 8px 16px;">
            <i class="fas fa-check-circle" style="color: #10B981;"></i> Livrées
          </button>
        </div>
      </div>

      <!-- LISTE DES LIVRAISONS -->
      <div id="liste-livraisons" class="commandes-grid" style="display: grid; grid-template-columns: 1fr; gap: 16px;">
        <div class="chargement">
          <div class="skeleton skeleton-carte" style="width:100%"></div>
          <div class="skeleton skeleton-carte" style="width:100%"></div>
        </div>
      </div>

    </main>
  </div>

  <script src="../../assets/js/commun/api.js"></script>
  <script src="../../assets/js/commun/navbar.js"></script>
  <script src="../../assets/js/espace-livreur/livraisons.js"></script>
</body>
</html>
